name: CI

# Enforces the `main` contract from docs/14-git-workflow-and-ci.md:
# every commit on main builds, passes tests, and respects the architecture boundaries.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test & enforce boundaries
    runs-on: macos-26 # ships Xcode 26 / Swift 6.2 / iOS 26 SDK by default
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # Fail fast on architecture violations before spending build time.
      # Closes SwiftPM's shared-module-cache gap; see docs/12-scaffolding.md §12.3.
      - name: Enforce architecture boundaries
        run: ./Scripts/check-boundaries.sh

      - name: Build (Swift 6, strict concurrency)
        run: swift build

      - name: Test (Swift Testing)
        run: swift test

  ios-app:
    name: Build iOS app (simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Builds the thin Xcode app target for the simulator, proving the runnable iOS app stays green.
      # The SwiftPM package (built/tested in `verify`) holds all the logic; this only adds the host.
      #
      # The watch app is embedded in the iOS app (Embed Watch Content + target dependency), so this build
      # also builds the watch app for watchsimulator — which validates the watchOS target too. That means
      # a plain 'generic/platform=iOS Simulator' destination no longer works: it can't resolve a paired
      # watch and mis-targets the watch's Swift-package products to iphonesimulator
      # ("Build input file cannot be found: …WatchSupportKit.o"). So we build against a concrete iPhone
      # simulator that has a paired watch — discovering one (and pairing if needed) first.
      - name: Build SignalFlow.app for iOS Simulator (embeds the watch app)
        run: |
          set -euo pipefail

          PHONE_UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices | to_entries[] | select(.key | test("iOS")) | .value[] | select(.name | test("iPhone"))][0].udid')
          WATCH_UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices | to_entries[] | select(.key | test("watchOS")) | .value[] | select(.name | test("Watch"))][0].udid')
          echo "iPhone simulator: $PHONE_UDID"
          echo "Apple Watch simulator: $WATCH_UDID"
          test -n "$PHONE_UDID" && test "$PHONE_UDID" != "null" || { echo "::error::no iPhone simulator available"; exit 1; }

          # Ensure the iPhone has a paired watch so xcodebuild builds the embedded watch app for
          # watchsimulator. `pair` is a no-op-ish if already paired; tolerate its error.
          if [ -n "$WATCH_UDID" ] && [ "$WATCH_UDID" != "null" ]; then
            xcrun simctl pair "$WATCH_UDID" "$PHONE_UDID" || true
          fi

          xcodebuild build \
            -project App/SignalFlow.xcodeproj \
            -scheme SignalFlow \
            -destination "platform=iOS Simulator,id=$PHONE_UDID" \
            CODE_SIGNING_ALLOWED=NO
