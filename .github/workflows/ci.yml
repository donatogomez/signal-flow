name: CI

# Enforces the `main` contract from docs/14-git-workflow-and-ci.md:
# every commit on main builds, passes tests, and respects the architecture boundaries.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test & enforce boundaries
    runs-on: macos-26 # ships Xcode 26 / Swift 6.2 / iOS 26 SDK by default
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # Fail fast on architecture violations before spending build time.
      # Closes SwiftPM's shared-module-cache gap; see docs/12-scaffolding.md §12.3.
      - name: Enforce architecture boundaries
        run: ./Scripts/check-boundaries.sh

      - name: Build (Swift 6, strict concurrency)
        run: swift build

      - name: Test (Swift Testing)
        run: swift test

  ios-app:
    name: Build iOS app (simulator)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Builds the thin Xcode app target for the simulator, proving the runnable iOS app stays green.
      # The SwiftPM package (built/tested in `verify`) holds all the logic; this only adds the host.
      - name: Build SignalFlow.app for iOS Simulator
        run: |
          xcodebuild build \
            -project App/SignalFlow.xcodeproj \
            -scheme SignalFlow \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
